<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="电影/动漫推荐墙 - 精选6部经典电影和动漫作品，为您呈现一场视觉与心灵的双重盛宴">
    <title>电影/动漫推荐墙 | 经典之作 · 值得一看</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           CSS 变量定义 —— 所有颜色和间距必须使用这些变量
           ============================================================ */
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #0f3460;
            --accent-primary: #e94560;
            --accent-secondary: #ff6b9d;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-muted: #808080;
            --gradient-start: #e94560;
            --gradient-end: #0f3460;
            --shadow-light: rgba(233, 69, 96, 0.1);
            --shadow-medium: rgba(0, 0, 0, 0.3);
            --shadow-heavy: rgba(0, 0, 0, 0.5);
            --star-color: #ffd700;
            --font-heading: 'Poppins', 'Noto Sans SC', sans-serif;
            --font-body: 'Noto Sans SC', 'Poppins', sans-serif;
            --spacing-xs: 0.5rem;
            --spacing-sm: 1rem;
            --spacing-md: 1.5rem;
            --spacing-lg: 2rem;
            --spacing-xl: 3rem;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition-fast: 200ms ease;
            --transition-normal: 300ms ease;
            --transition-slow: 500ms ease;
        }

        /* ============================================================
           全局重置
           ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ============================================================
           Header 头部
           ============================================================ */
        .header {
            position: relative;
            padding: var(--spacing-xl) var(--spacing-lg);
            text-align: center;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            overflow: hidden;
        }

        .header-content {
            position: relative;
            z-index: 2;
        }

        .header-decoration {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, var(--accent-primary) 0%, transparent 50%),
                        radial-gradient(circle at 80% 50%, var(--accent-secondary) 0%, transparent 50%);
            opacity: 0.15;
            z-index: 1;
        }

        .main-title {
            font-family: var(--font-heading);
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--spacing-sm);
            letter-spacing: 0.05em;
        }

        .subtitle {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 0.1em;
        }

        /* ============================================================
           主内容区域
           ============================================================ */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--spacing-lg);
        }

        /* ============================================================
           Hero 区域
           ============================================================ */
        .hero-section {
            text-align: center;
            padding: var(--spacing-xl) 0;
            margin-bottom: var(--spacing-lg);
        }

        .hero-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .hero-title {
            font-family: var(--font-heading);
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--spacing-sm);
            opacity: 0.95;
        }

        .hero-description {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: var(--text-secondary);
            font-weight: 300;
        }

        /* ============================================================
           区域标题
           ============================================================ */
        .section-title {
            font-family: var(--font-heading);
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 600;
            text-align: center;
            margin-bottom: var(--spacing-xl);
            color: var(--text-primary);
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            margin: var(--spacing-sm) auto 0;
            border-radius: 2px;
        }

        /* ============================================================
           筛选工具栏（新增）
           ============================================================ */
        .filter-toolbar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: var(--spacing-md);
            flex-wrap: wrap;
            margin-bottom: var(--spacing-lg);
        }

        .filter-buttons {
            display: flex;
            gap: var(--spacing-xs);
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: var(--spacing-xs) var(--spacing-md);
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 500;
            transition: all var(--transition-fast);
            white-space: nowrap;
        }

        .filter-btn:hover:not(.active) {
            border-color: var(--accent-secondary);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: var(--text-primary);
        }

        /* 筛选按钮计数徽章 */
        .filter-count {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 4px;
            transition: all var(--transition-fast);
        }

        .filter-btn.active .filter-count {
            background: rgba(255, 255, 255, 0.35);
        }

        /* ============================================================
           筛选结果统计栏（新增）
           ============================================================ */
        .filter-result-bar {
            display: none;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-xs) 0;
            margin-bottom: var(--spacing-sm);
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-family: var(--font-body);
            animation: fadeInUp 300ms ease;
        }

        .filter-result-bar.visible {
            display: flex;
        }

        .filter-result-count {
            color: var(--accent-primary);
            font-weight: 600;
        }

        .filter-result-reset {
            background: none;
            border: none;
            color: var(--accent-secondary);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.85rem;
            text-decoration: underline;
            transition: color var(--transition-fast);
        }

        .filter-result-reset:hover {
            color: var(--accent-primary);
        }

        /* ============================================================
           搜索框（新增）
           ============================================================ */
        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-sm);
            padding: 0 var(--spacing-sm);
            transition: border-color var(--transition-fast);
            min-width: 220px;
        }

        .search-box:focus-within {
            border-color: var(--accent-primary);
        }

        .search-icon {
            color: var(--text-muted);
            font-size: 1rem;
            margin-right: var(--spacing-xs);
            flex-shrink: 0;
        }

        .search-input {
            background: none;
            border: none;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.95rem;
            padding: var(--spacing-xs) 0;
            outline: none;
            width: 180px;
            flex: 1;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-clear {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            padding: var(--spacing-xs);
            display: none;
            flex-shrink: 0;
            transition: color var(--transition-fast);
        }

        .search-clear:hover {
            color: var(--text-primary);
        }

        .search-clear.visible {
            display: block;
        }

        /* ============================================================
           推荐区域
           ============================================================ */
        .recommendations-section {
            position: relative;
        }

        /* ============================================================
           卡片网格
           ============================================================ */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: var(--spacing-lg);
            margin-top: var(--spacing-lg);
        }

        /* ============================================================
           卡片样式
           ============================================================ */
        .card {
            position: relative;
            background: linear-gradient(145deg, var(--bg-card) 0%, var(--bg-secondary) 100%);
            border-radius: var(--radius-lg);
            overflow: hidden;
            /* 滚动淡入初始状态 —— 使用 translateY + scale 组合确保与 card-hidden 过渡兼容 */
            opacity: 0;
            transform: translateY(30px) scale(1);
            transition: transform var(--transition-normal),
                        box-shadow var(--transition-normal),
                        opacity var(--transition-normal);
            box-shadow: 0 4px 20px var(--shadow-medium);
            border: 1px solid rgba(233, 69, 96, 0.1);
        }

        /* 滚动淡入后的可见状态 —— translateY(0) + scale(1) 确保与 card-hidden 的动画兼容 */
        .card.card-visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* 卡片 hover 上浮效果 —— 必须在 .card-visible 之后，确保优先级覆盖 */
        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 12px 40px var(--shadow-heavy), 0 0 30px var(--shadow-light);
        }

        /* 筛选/搜索时的隐藏状态 —— 使用 translateY(0)+scale(0.9) 组合以与可见状态兼容过渡
           必须在 .card:hover 之后以覆盖 hover 的 transform，pointer-events:none 确保隐藏卡片不响应交互 */
        .card.card-hidden {
            opacity: 0;
            transform: translateY(0) scale(0.9);
            pointer-events: none;
        }

        .card-image {
            position: relative;
            width: 100%;
            height: 200px;
            overflow: hidden;
            background: var(--bg-primary);
            cursor: pointer;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: transform var(--transition-slow),
                        opacity var(--transition-normal);
        }

        /* 图片加载完成后渐显 */
        .card-image img.loaded {
            opacity: 1;
        }

        .card:hover .card-image img {
            transform: scale(1.05);
        }

        .card-content {
            padding: var(--spacing-md);
        }

        .card-tag {
            display: inline-block;
            padding: var(--spacing-xs) var(--spacing-sm);
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: var(--text-primary);
            font-size: 0.75rem;
            font-weight: 500;
            border-radius: var(--radius-sm);
            margin-bottom: var(--spacing-xs);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* 子类型标签（新增） */
        .card-genres {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: var(--spacing-xs);
        }

        .card-genre-tag {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(233, 69, 96, 0.15);
            color: var(--accent-secondary);
            font-size: 0.7rem;
            font-weight: 400;
            border-radius: 4px;
            border: 1px solid rgba(233, 69, 96, 0.25);
            letter-spacing: 0.03em;
        }

        .card-title {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--spacing-xs);
        }

        .card-meta {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: var(--spacing-sm);
            font-weight: 400;
        }

        .card-description {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: var(--spacing-sm);
        }

        /* 卡片底部区域：评分 + 点赞 */
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: var(--spacing-sm);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-rating {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .rating-stars {
            font-size: 1.25rem;
            color: var(--star-color);
        }

        .rating-score {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* ============================================================
           点赞按钮（新增） —— 弹跳动画 + localStorage 持久化
           ============================================================ */
        .btn-like {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--text-muted);
            padding: 0 var(--spacing-xs);
            transition: color var(--transition-fast), transform var(--transition-fast);
            line-height: 1;
            user-select: none;
        }

        .btn-like:hover {
            color: var(--accent-secondary);
            transform: scale(1.2);
        }

        /* 已点赞状态：实心红色 */
        .btn-like.liked {
            color: var(--accent-primary);
        }

        .btn-like.liked:hover {
            color: var(--accent-secondary);
        }

        /* 点赞弹跳动画 */
        .btn-like.pop {
            animation: heartPop 200ms ease;
        }

        /* ============================================================
           空状态提示（新增）
           ============================================================ */
        .empty-state {
            display: none;
            text-align: center;
            padding: var(--spacing-xl);
            color: var(--text-muted);
            font-size: 1.1rem;
            font-family: var(--font-body);
            animation: fadeInUp 400ms ease;
        }

        .empty-state.visible {
            display: block;
        }

        /* ============================================================
           加载遮罩（新增）
           ============================================================ */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity var(--transition-normal);
        }

        .loading-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--text-muted);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* ============================================================
           Lightbox 画廊（新增） —— 全屏预览 + 动画
           ============================================================ */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        /* 打开状态 */
        .lightbox-overlay.open {
            opacity: 1;
        }

        /* 关闭状态 */
        .lightbox-overlay.closing {
            opacity: 0;
        }

        .lightbox-close {
            position: absolute;
            top: var(--spacing-lg);
            right: var(--spacing-lg);
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 2rem;
            cursor: pointer;
            z-index: 10001;
            transition: color var(--transition-fast), transform var(--transition-fast);
            line-height: 1;
        }

        .lightbox-close:hover {
            color: var(--accent-primary);
            transform: scale(1.2);
        }

        .lightbox-image {
            max-width: 90vw;
            max-height: 80vh;
            object-fit: contain;
            border-radius: var(--radius-md);
            transform: scale(0.8);
            opacity: 0;
            transition: transform var(--transition-normal) cubic-bezier(0.34, 1.56, 0.64, 1),
                        opacity var(--transition-normal);
        }

        /* 打开时图片动画 */
        .lightbox-overlay.open .lightbox-image {
            transform: scale(1);
            opacity: 1;
        }

        /* 关闭时图片动画 */
        .lightbox-overlay.closing .lightbox-image {
            transform: scale(0.9);
            opacity: 0;
            transition: transform var(--transition-fast),
                        opacity var(--transition-fast);
        }

        .lightbox-caption {
            color: var(--text-secondary);
            margin-top: var(--spacing-md);
            font-size: 1.1rem;
            font-family: var(--font-heading);
            text-align: center;
            max-width: 90vw;
        }

        /* ============================================================
           Footer 页脚
           ============================================================ */
        .footer {
            background: var(--bg-secondary);
            padding: var(--spacing-xl) var(--spacing-lg);
            margin-top: var(--spacing-xl);
            text-align: center;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .copyright {
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: var(--spacing-xs);
            font-weight: 400;
        }

        .footer-note {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        /* ============================================================
           关键帧动画
           ============================================================ */
        /* Loading spinner 旋转 */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 点赞弹跳 */
        @keyframes heartPop {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.4);
            }
            100% {
                transform: scale(1);
            }
        }

        /* 空状态淡入上移 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================================
           响应式布局
           ============================================================ */

        /* ≤1024px：卡片 2 列 */
        @media (max-width: 1024px) {
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .main-content {
                padding: var(--spacing-md);
            }
        }

        /* ≤768px：卡片 1 列，筛选工具栏纵向排列，搜索框全宽 */
        @media (max-width: 768px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
            .header {
                padding: var(--spacing-lg) var(--spacing-md);
            }
            .main-content {
                padding: var(--spacing-sm);
            }
            .hero-section {
                padding: var(--spacing-lg) 0;
            }
            .card-image {
                height: 180px;
            }
            .card-content {
                padding: var(--spacing-sm);
            }
            .card-title {
                font-size: 1.25rem;
            }

            /* 筛选工具栏纵向排列 */
            .filter-toolbar {
                flex-direction: column;
                align-items: stretch;
                gap: var(--spacing-sm);
            }

            .filter-buttons {
                justify-content: center;
            }

            .search-box {
                width: 100%;
                min-width: unset;
            }

            .search-input {
                width: 100%;
            }
        }

        /* ≤480px：筛选按钮 2x2 网格，搜索框全宽 */
        @media (max-width: 480px) {
            .card-grid {
                gap: var(--spacing-md);
            }
            .card-image {
                height: 160px;
            }
            .main-title {
                font-size: 1.75rem;
            }
            .hero-title {
                font-size: 1.25rem;
            }
            .section-title {
                font-size: 1.5rem;
            }

            /* 筛选按钮 2x2 网格布局 */
            .filter-buttons {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: var(--spacing-xs);
            }

            .filter-btn {
                text-align: center;
                font-size: 0.85rem;
                padding: var(--spacing-xs) var(--spacing-sm);
            }

            /* Lightbox 关闭按钮适配 */
            .lightbox-close {
                top: var(--spacing-sm);
                right: var(--spacing-sm);
                font-size: 1.5rem;
            }
        }

        /* ============================================================
           无障碍：减少动画偏好
           ============================================================ */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- ============================================================
         加载遮罩层 —— 页面初始显示，800ms 后渐隐
         ============================================================ -->
    <div class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- ============================================================
         Header 头部
         ============================================================ -->
    <header class="header">
        <div class="header-content">
            <h1 class="main-title">电影/动漫推荐墙</h1>
            <p class="subtitle">经典之作 · 值得一看</p>
        </div>
        <div class="header-decoration"></div>
    </header>

    <!-- ============================================================
         主内容区域
         ============================================================ -->
    <main class="main-content">
        <!-- Hero 区域 -->
        <section class="hero-section">
            <div class="hero-content">
                <h2 class="hero-title">探索经典 · 发现美好</h2>

        // ============================================================

        function getImageUrl(prompt) {

        // ============================================================
        // 渲染卡片 —— 根据传入的电影数组动态生成 HTML

            grid.innerHTML = movies.map(function (movie) {

        // ============================================================
        // 加载遮罩逻辑 —— 800ms 后渐隐
        // ============================================================
        function initLoadingOverlay() {
            var overlay = document.querySelector('.loading-overlay');
            if (!overlay) return;

            setTimeout(function () {
                overlay.classList.add('fade-out');
                // 过渡结束后移除 DOM 元素
                overlay.addEventListener('transitionend', function handler(e) {
                    if (e.target === overlay && e.propertyName === 'opacity') {
                        overlay.remove();
                        overlay.removeEventListener('transitionend', handler);
                    }
                });
            }, 800);
        }

        // ============================================================
        // 筛选逻辑 —— 当前激活的分类
        // ============================================================
        var currentFilter = 'all';

        function applyFilterAndSearch() {
            var searchInput = document.querySelector('.search-input');
            var keyword = searchInput ? searchInput.value.trim().toLowerCase() : '';
            var cards = document.querySelectorAll('.card');
            var emptyState = document.querySelector('.empty-state');
            var resultBar = document.querySelector('.filter-result-bar');
            var resultCount = document.querySelector('.filter-result-count');
            var visibleCount = 0;

            cards.forEach(function (card) {
                var category = card.getAttribute('data-category');
                var title = (card.querySelector('.card-title') || {}).textContent || '';
                var titleLower = title.toLowerCase();

                // 分类匹配：all 或匹配具体分类
                var categoryMatch = (currentFilter === 'all' || category === currentFilter);
                // 搜索匹配：大小写不敏感
                var searchMatch = (keyword === '' || titleLower.indexOf(keyword) !== -1);

                if (categoryMatch && searchMatch) {
                    card.classList.remove('card-hidden');
                    visibleCount++;
                } else {
                    card.classList.add('card-hidden');
                }
            });

            // 更新结果统计栏
            if (resultCount) {
                resultCount.textContent = visibleCount;
            }
            if (resultBar) {
                // 只在非"全部+无搜索"时显示统计栏
                if (currentFilter !== 'all' || keyword !== '') {
                    resultBar.classList.add('visible');
                } else {
                    resultBar.classList.remove('visible');
                }
            }

            // 空状态显示控制
            if (visibleCount === 0) {
                emptyState.classList.add('visible');
            } else {
                emptyState.classList.remove('visible');
            }

            // URL hash 同步
            syncHash();
        }

        // ============================================================
        // URL hash 同步 —— 筛选状态反映到 URL
        // ============================================================
        function syncHash() {
            var searchInput = document.querySelector('.search-input');
            var keyword = searchInput ? searchInput.value.trim() : '';
            var hash = '';
            if (currentFilter !== 'all') {
                hash = currentFilter;
            }
            if (keyword !== '') {
                hash += (hash ? '&' : '') + 'q=' + encodeURIComponent(keyword);
            }
            // 使用 replaceState 避免产生过多历史记录
            if (hash) {
                history.replaceState(null, '', '#' + hash);
            } else {
                history.replaceState(null, '', window.location.pathname);
            }
        }

        // ============================================================
        // 从 URL hash 恢复筛选状态
        // ============================================================
        function initHashRouting() {
            var hash = window.location.hash.replace('#', '');
            if (!hash) return;

            var parts = hash.split('&');
            var filterFromHash = null;
            var queryFromHash = null;

            parts.forEach(function (part) {
                if (part.indexOf('q=') === 0) {
                    queryFromHash = decodeURIComponent(part.slice(2));
                } else if (part) {
                    filterFromHash = part;
                }
            });

            // 验证筛选值是否有效
            var validFilters = ['all', 'anime-movie', 'sci-fi', 'anime'];
            if (filterFromHash && validFilters.indexOf(filterFromHash) !== -1 && filterFromHash !== 'all') {
                currentFilter = filterFromHash;
                var filterBtns = document.querySelectorAll('.filter-btn');
                filterBtns.forEach(function (btn) {
                    var btnFilter = btn.getAttribute('data-filter');
                    if (btnFilter === filterFromHash) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
            }

            // 恢复搜索关键词
            if (queryFromHash) {
                var searchInput = document.querySelector('.search-input');
                if (searchInput) {
                    searchInput.value = queryFromHash;
                    updateClearButton();
                }
            }

            // 应用筛选
            applyFilterAndSearch();
        }

        // ============================================================
        // 筛选结果栏"清除筛选"按钮
        // ============================================================
        function initFilterResultReset() {
            var resetBtn = document.querySelector('.filter-result-reset');
            if (!resetBtn) return;

            resetBtn.addEventListener('click', function () {
                // 切换为"全部"
                currentFilter = 'all';
                var filterBtns = document.querySelectorAll('.filter-btn');
                filterBtns.forEach(function (btn) {
                    btn.classList.remove('active');
                    if (btn.getAttribute('data-filter') === 'all') {
                        btn.classList.add('active');
                    }
                });

                // 清空搜索
                var searchInput = document.querySelector('.search-input');
                if (searchInput) {
                    searchInput.value = '';
                    updateClearButton();
                }

                // 立即应用
                if (searchTimer) clearTimeout(searchTimer);
                applyFilterAndSearch();
            });
        }

        // ============================================================
        // 搜索防抖 —— 300ms
        // ============================================================
        var searchTimer = null;

        function debouncedSearch() {
            if (searchTimer) {
                clearTimeout(searchTimer);
            }
            searchTimer = setTimeout(function () {
                applyFilterAndSearch();
            }, 300);
        }

        // ============================================================
        // 中文输入法组合输入处理
        // ============================================================
        var isComposing = false;

        function initSearchInput() {
            var searchInput = document.querySelector('.search-input');
            var clearBtn = document.querySelector('.search-clear');
            if (!searchInput) return;

            // 初始化清除按钮状态
            updateClearButton();

            // compositionstart：中文输入法开始组合输入
            searchInput.addEventListener('compositionstart', function () {
                isComposing = true;
            });

            // compositionend：中文输入法结束组合输入，此时才触发搜索
            searchInput.addEventListener('compositionend', function () {
                isComposing = false;
                // 更新清除按钮状态
                updateClearButton();
                // 触发防抖搜索
                debouncedSearch();
            });

            // input 事件：非组合输入时直接触发
            searchInput.addEventListener('input', function () {
                updateClearButton();
                if (!isComposing) {
                    debouncedSearch();
                }
            });

            // 清除按钮
            if (clearBtn) {
                clearBtn.addEventListener('click', function () {
                    searchInput.value = '';
                    updateClearButton();
                    // 立即触发筛选（无需防抖）
                    if (searchTimer) clearTimeout(searchTimer);
                    applyFilterAndSearch();
                    searchInput.focus();
                });
            }
        }

        // 更新清除按钮的显示/隐藏
        function updateClearButton() {
            var searchInput = document.querySelector('.search-input');
            var clearBtn = document.querySelector('.search-clear');
            if (!searchInput || !clearBtn) return;

            if (searchInput.value.trim().length > 0) {
                clearBtn.classList.add('visible');
            } else {
                clearBtn.classList.remove('visible');
            }
        }

        // ============================================================
        // 筛选按钮事件绑定
        // ============================================================
        function initFilterButtons() {
            var filterBtns = document.querySelectorAll('.filter-btn');
            filterBtns.forEach(function (btn) {
                btn.addEventListener('click', function () {
                    // 更新 active 状态
                    filterBtns.forEach(function (b) { b.classList.remove('active'); });
                    btn.classList.add('active');

                    // 更新当前筛选值
                    currentFilter = btn.getAttribute('data-filter');
                    // 应用筛选+搜索
                    applyFilterAndSearch();
                });
            });
        }

        // ============================================================
        // 点赞系统 —— localStorage 持久化
        // localStorage key: "movie_likes"，值为已点赞 id 的 JSON 数组
        // ============================================================
        function getLikes() {
            try {
                var raw = localStorage.getItem('movie_likes');
                return raw ? JSON.parse(raw) : [];
            } catch (e) {
                return [];
            }
        }

        function saveLikes(likes) {
            try {
                localStorage.setItem('movie_likes', JSON.stringify(likes));
            } catch (e) {
                // localStorage 不可用时静默失败
            }
        }

        // 初始化所有点赞按钮的状态（从 localStorage 恢复）
        function initLikes() {
            var likes = getLikes();
            var likeButtons = document.querySelectorAll('.btn-like');

            likeButtons.forEach(function (btn) {
                var movieId = btn.getAttribute('data-id');
                if (likes.indexOf(movieId) !== -1) {
                    // 已点赞：实心红心
                    btn.classList.add('liked');
                    btn.innerHTML = '&#9829;';
                } else {
                    btn.classList.remove('liked');
                    btn.innerHTML = '&#9825;';
                }
            });
        }

        // 点赞/取消点赞处理函数
        function toggleLike(movieId, button) {
            var likes = getLikes();
            var index = likes.indexOf(movieId);

            if (index === -1) {
                // 添加点赞
                likes.push(movieId);
                button.classList.add('liked');
                button.innerHTML = '&#9829;';
            } else {
                // 取消点赞
                likes.splice(index, 1);
                button.classList.remove('liked');
                button.innerHTML = '&#9825;';
            }

            saveLikes(likes);

            // 触发弹跳动画：先移除再添加 pop 类以重新触发动画
            button.classList.remove('pop');
            // 强制回流（reflow），确保动画重新触发
            void button.offsetWidth;
            button.classList.add('pop');
            // 动画结束后清理
            button.addEventListener('animationend', function handler() {
                button.classList.remove('pop');
                button.removeEventListener('animationend', handler);
            });
        }

        // ============================================================
        // Lightbox 画廊 —— 全屏图片预览
        // ============================================================
        function openLightbox(imageSrc, caption) {
            // 禁止页面滚动
            document.body.style.overflow = 'hidden';

            // 创建 Lightbox DOM
            var overlay = document.createElement('div');
            overlay.className = 'lightbox-overlay';
            overlay.innerHTML =
                '<button class="lightbox-close" aria-label="关闭">&#10005;</button>'
                + '<img class="lightbox-image" src="' + imageSrc + '" alt="' + caption + '">'
                + '<p class="lightbox-caption">' + caption + '</p>';
            document.body.appendChild(overlay);

            // 绑定关闭事件
            bindLightboxEvents(overlay);

            // 触发入场动画：下一帧添加 open 类
            requestAnimationFrame(function () {
                requestAnimationFrame(function () {
                    overlay.classList.add('open');
                });
            });
        }

        function closeLightbox(overlay) {
            if (!overlay) return;

            // 添加关闭动画类
            overlay.classList.add('closing');
            overlay.classList.remove('open');

            // 动画结束后移除 DOM
            overlay.addEventListener('transitionend', function handler(e) {
                // 只监听遮罩层的 opacity 过渡结束
                if (e.target === overlay && e.propertyName === 'opacity') {
                    overlay.remove();
                    document.body.style.overflow = '';
                    overlay.removeEventListener('transitionend', handler);
                }
            });
        }

        function bindLightboxEvents(overlay) {
            // 键盘 ESC 关闭
            function onKeyDown(e) {
                if (e.key === 'Escape') {
                    closeLightbox(overlay);
                    document.removeEventListener('keydown', onKeyDown);
                }
            }
            document.addEventListener('keydown', onKeyDown);

            // 点击关闭按钮
            var closeBtn = overlay.querySelector('.lightbox-close');
            if (closeBtn) {
                closeBtn.addEventListener('click', function () {
                    closeLightbox(overlay);
                    document.removeEventListener('keydown', onKeyDown);
                });
            }

            // 点击遮罩（非图片区域）关闭
            overlay.addEventListener('click', function (e) {
                if (e.target === overlay) {
                    closeLightbox(overlay);
                    document.removeEventListener('keydown', onKeyDown);
                }
            });
        }

        // ============================================================
        // 事件委托 —— 在 .card-grid 上统一处理点赞和 Lightbox 点击
        // ============================================================
        function initEventDelegation() {
            var cardGrid = document.querySelector('.card-grid');
            if (!cardGrid) return;

            cardGrid.addEventListener('click', function (e) {
                var target = e.target;

                // 点赞按钮点击
                if (target.classList.contains('btn-like') || target.closest('.btn-like')) {
                    var btn = target.classList.contains('btn-like') ? target : target.closest('.btn-like');
                    var movieId = btn.getAttribute('data-id');
                    if (movieId) {
                        toggleLike(movieId, btn);
                    }
                    return;
                }

                // 卡片图片点击 → 打开 Lightbox
                var cardImage = target.closest('.card-image');
                if (cardImage) {
                    var img = cardImage.querySelector('img');
                    var card = target.closest('.card');
                    var titleEl = card ? card.querySelector('.card-title') : null;
                    var caption = titleEl ? titleEl.textContent : '';

                    if (img && img.src) {
                        openLightbox(img.src, caption);
                    }
                    return;
                }
            });
        }

        // ============================================================
        // IntersectionObserver 滚动淡入动画
        // 卡片初始 opacity:0, translateY:30px；进入视口后淡入上移
        // 每张卡片交错延迟 index * 100ms
        // ============================================================
        function setupScrollObserver() {
            var cards = document.querySelectorAll('.card');
            if (cards.length === 0) return;

            var observerOptions = {
                root: null,
                rootMargin: '0px 0px -30px 0px',
                threshold: 0.1
            };

            var cardObserver = new IntersectionObserver(function (entries) {
                entries.forEach(function (entry) {
                    if (entry.isIntersecting) {
                        var card = entry.target;
                        // 获取卡片在所有卡片中的索引，用于计算交错延迟
                        var allCards = document.querySelectorAll('.card');
                        var index = Array.prototype.indexOf.call(allCards, card);

                        setTimeout(function () {
                            card.classList.add('card-visible');
                        }, index * 100);

                        // 只触发一次
                        cardObserver.unobserve(card);
                    }
                });
            }, observerOptions);

            cards.forEach(function (card) {
                cardObserver.observe(card);
            });

            // 存储观察器引用，避免被垃圾回收
            window._cardObserver = cardObserver;
        }

        // ============================================================
        // 图片加载渐入效果 —— CSS 初始 opacity:0，加载完成后添加 .loaded 渐显
        // ============================================================
        function initImageFadeIn() {
            // 监听图片加载完成，添加 .loaded 触发 opacity 过渡
            document.addEventListener('load', function (e) {
                var img = e.target;
                if (img && img.tagName === 'IMG' && img.closest('.card-image')) {
                    img.classList.add('loaded');
                }
            }, true);

            // 监听图片加载失败，显示替代文本
            document.addEventListener('error', function (e) {
                var img = e.target;
                if (img && img.tagName === 'IMG') {
                    img.alt = '图片加载失败';
                    img.classList.add('loaded');
                }
            }, true);
        }

        // ============================================================
        // 初始化入口
        // ============================================================
        function init() {
            // 1. 渲染卡片
            renderCards(MOVIES);

            // 2. 加载遮罩
            initLoadingOverlay();

            // 3. 筛选按钮
            initFilterButtons();

            // 4. 搜索框
            initSearchInput();

            // 5. 筛选结果栏重置按钮
            initFilterResultReset();

            // 6. 事件委托
            initEventDelegation();

            // 7. 图片淡入
            initImageFadeIn();

            // 8. URL hash 路由恢复
            initHashRouting();

            console.log('电影/动漫推荐墙已加载完成');
        }

        // 监听浏览器 hash 变化（手动修改 URL 或前进后退）
        window.addEventListener('hashchange', function () {
            initHashRouting();
        });
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
</body>
</html>
